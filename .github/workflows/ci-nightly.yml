name: ci-nightly

on:
  schedule:
    # Weekdays at 04:00 UTC
    - cron: "0 4 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: ci-nightly
  cancel-in-progress: true

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: stocksignal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      # ── Backend Setup ───────────────────────────────────────────────
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen

      # ── Frontend Setup ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci

      # ── Playwright Setup ────────────────────────────────────────────
      - run: cd tests/e2e/playwright && npm ci
      - run: npx playwright install chromium --with-deps

      # ── Database Migrations ─────────────────────────────────────────
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}

      # ── Build Frontend (production) ─────────────────────────────────
      - run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8181

      # ── Start Services ──────────────────────────────────────────────
      - name: Start backend
        run: |
          uv run uvicorn backend.main:app --port 8181 &
          sleep 5
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}

      - name: Start frontend
        run: |
          cd frontend && npm start &
          sleep 5

      # ── Seed E2E User ───────────────────────────────────────────────
      - name: Create E2E test user
        run: |
          curl -s -X POST http://localhost:8181/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e@test.com","password":"TestPass1!"}' || true

      # ── Run Performance Tests ───────────────────────────────────────
      - name: Lighthouse audits
        run: |
          cd tests/e2e/playwright && npx playwright test tests/performance/lighthouse.spec.ts --reporter=list
        continue-on-error: true

      - name: Chart sizing tests
        run: |
          cd tests/e2e/playwright && npx playwright test tests/performance/chart-sizing.spec.ts --reporter=list
        continue-on-error: true

      - name: Memory heap tracking
        run: |
          cd tests/e2e/playwright && npx playwright test tests/performance/memory.spec.ts --reporter=list
        continue-on-error: true

      - name: Responsive breakpoint tests
        run: |
          cd tests/e2e/playwright && npx playwright test tests/responsive/breakpoints.spec.ts --reporter=list
        continue-on-error: true

      # ── Upload Artifacts ────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: tests/e2e/playwright/playwright-report/
          retention-days: 14
