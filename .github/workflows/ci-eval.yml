# CI Eval — runs agent regression tests when agent/tool code changes.
# Triggers: PRs touching backend/agents/ or backend/tools/, weekly cron, manual dispatch.

name: CI Eval — Agent Regression

on:
  pull_request:
    paths:
      - 'backend/agents/**'
      - 'backend/tools/**'
      - 'tests/unit/agents/**'
      - 'tests/unit/adversarial/**'
      - 'tests/e2e/**'
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  agent-regression:
    name: Agent Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # No postgres service needed — agent unit tests use mocks, not real DB.
    # The root conftest tries to create a testcontainer when CI!=true,
    # so we set CI=true and provide a placeholder DATABASE_URL to skip that.

    env:
      DATABASE_URL: "postgresql+asyncpg://skip:skip@localhost:5432/skip"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY: "ci-test-secret-key-not-real"
      JWT_ALGORITHM: "HS256"
      GROQ_API_KEY: ${{ secrets.CI_GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.CI_ANTHROPIC_API_KEY }}
      CI: true

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run agent unit tests
        run: uv run pytest tests/unit/agents/ tests/unit/adversarial/ -v --tb=short

      - name: Run e2e structural tests (if LLM key available)
        if: env.GROQ_API_KEY != '' || env.ANTHROPIC_API_KEY != ''
        run: uv run pytest tests/e2e/ -v --timeout=120 --tb=short
        continue-on-error: true
