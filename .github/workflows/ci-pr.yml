name: ci-pr

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/unit/**'
              - 'tests/api/**'
              - 'tests/integration/**'
              - 'tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
            frontend:
              - 'frontend/**'
            infra:
              - '.github/workflows/**'
              - 'docker-compose*.yml'
              - 'backend/config.py'
              - 'scripts/**'
            migrations:
              - 'backend/migrations/**'
              - 'alembic.ini'

  backend-lint:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check backend/ tests/ scripts/ --no-fix
      - name: Ruff format check
        run: uv run ruff format backend/ tests/ scripts/ --check

  frontend-lint:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit

  backend-test:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
        run: uv run alembic upgrade head
      - name: Run unit tests (xdist)
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/unit/ -n auto --timeout=30 -q --tb=short --randomly-seed=12345 -m "not domain and not regression" --cov=backend --cov-report=term-missing --no-cov-on-fail
      - name: Run API tests
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/api/ --timeout=60 -q --tb=short
      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/integration/ -v --tb=short -m integration

  frontend-test:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run frontend tests
        run: npm test -- --passWithNoTests

  e2e-lint:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e/playwright
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/e2e/playwright/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: List discovered tests
        run: npx playwright test --list 2>/dev/null || true

  semgrep:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            .semgrep/

  dependency-audit:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: pip-audit
        shell: bash
        run: uv run pip-audit --require-hashes --no-deps -r <(uv pip compile pyproject.toml) 2>/dev/null || uv run pip-audit
        continue-on-error: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-size:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build and check bundle size
        shell: bash
        run: |
          npm run build 2>&1 | tee /tmp/build-output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Next.js build failed (exit $BUILD_EXIT)"
            exit 1
          fi
          # Extract shared JS size from Next.js build output
          TOTAL_SIZE=$(grep -o 'First Load JS shared by all.*' /tmp/build-output.txt | grep -o '[0-9.]* kB' | head -1 || echo "unknown")
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "First Load JS shared: **${TOTAL_SIZE}**" >> $GITHUB_STEP_SUMMARY
          echo "Bundle size: $TOTAL_SIZE"

  domain-regression:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: Run domain and regression tests
        run: uv run pytest tests/unit/ -m "domain or regression" -q --timeout=30 || test $? -eq 5

  type-check:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: uv sync --frozen
      - name: Pyright on changed files
        shell: bash
        run: |
          CHANGED=$(git diff --name-only origin/develop -- 'backend/**.py' | head -50)
          if [ -z "$CHANGED" ]; then
            echo "No backend Python files changed — skipping pyright"
            exit 0
          fi
          echo "Checking $(echo "$CHANGED" | wc -l | tr -d ' ') changed files:"
          echo "$CHANGED"
          npx --yes pyright@latest $CHANGED

  ci-gate:
    if: always()
    needs:
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-test
      - e2e-lint
      - domain-regression
      - semgrep
      - dependency-audit
      - gitleaks
      - bundle-size
      - type-check
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          echo "Results:"
          echo "  backend-lint: ${{ needs.backend-lint.result }}"
          echo "  backend-test: ${{ needs.backend-test.result }}"
          echo "  frontend-lint: ${{ needs.frontend-lint.result }}"
          echo "  frontend-test: ${{ needs.frontend-test.result }}"
          echo "  e2e-lint: ${{ needs.e2e-lint.result }}"
          echo "  semgrep: ${{ needs.semgrep.result }}"
          echo "  dependency-audit: ${{ needs.dependency-audit.result }}"
          echo "  gitleaks: ${{ needs.gitleaks.result }}"
          echo "  bundle-size: ${{ needs.bundle-size.result }}"

          if [[ "${{ needs.backend-lint.result }}" == "failure" || "${{ needs.backend-lint.result }}" == "cancelled" ]]; then
            echo "FAIL: backend-lint"
            exit 1
          fi
          if [[ "${{ needs.backend-test.result }}" == "failure" || "${{ needs.backend-test.result }}" == "cancelled" ]]; then
            echo "FAIL: backend-test"
            exit 1
          fi
          if [[ "${{ needs.frontend-lint.result }}" == "failure" || "${{ needs.frontend-lint.result }}" == "cancelled" ]]; then
            echo "FAIL: frontend-lint"
            exit 1
          fi
          if [[ "${{ needs.frontend-test.result }}" == "failure" || "${{ needs.frontend-test.result }}" == "cancelled" ]]; then
            echo "FAIL: frontend-test"
            exit 1
          fi
          if [[ "${{ needs.e2e-lint.result }}" == "failure" || "${{ needs.e2e-lint.result }}" == "cancelled" ]]; then
            echo "FAIL: e2e-lint"
            exit 1
          fi

          echo "All required checks passed (or were skipped)"
