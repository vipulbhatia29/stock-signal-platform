name: ci-merge

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check backend/ tests/ scripts/ --no-fix
      - run: uv run ruff format backend/ tests/ scripts/ --check
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npx tsc --noEmit

  unit-and-api:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
        run: uv run alembic upgrade head
      - name: Run unit tests (xdist)
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/unit/ -n auto --timeout=30 -q --tb=short --randomly-seed=12345 --cov=backend --cov-report=term-missing --no-cov-on-fail
      - name: Run API tests
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/api/ --timeout=60 -q --tb=short
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Run frontend tests
        run: cd frontend && npm test -- --passWithNoTests

  domain-regression:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: Run domain and regression tests
        run: uv run pytest tests/unit/ -m "domain or regression" -q --timeout=30 || test $? -eq 5

  type-check-full:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: uv sync --frozen
      - name: Pyright full codebase check
        run: npx --yes pyright@latest backend/

  integration:
    needs: unit-and-api
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
        run: uv run alembic upgrade head
      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          REDIS_URL: ${{ secrets.CI_REDIS_URL }}
          JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
          JWT_ALGORITHM: ${{ secrets.CI_JWT_ALGORITHM }}
          MCP_TOOLS: "true"
          CI: "true"
        run: uv run pytest tests/integration/ -v --tb=short -m integration

  build:
    needs: integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Next.js production build
        run: npm run build 2>&1 | tee /tmp/next-build.log
      - name: Report bundle size
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          grep -A 20 "Route" /tmp/next-build.log | head -25 >> $GITHUB_STEP_SUMMARY || true
