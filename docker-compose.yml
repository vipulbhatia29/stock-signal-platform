services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ssp-postgres
    environment:
      POSTGRES_USER: stocksignal
      POSTGRES_PASSWORD: stocksignal
      POSTGRES_DB: stocksignal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocksignal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssp-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
