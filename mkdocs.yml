site_name: Stock Signal Platform
site_description: Personal stock analysis and investment signal platform
site_author: Vipul Bhatia

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - PRD: PRD.md
  - Functional Spec: FSD.md
  - Technical Design: TDD.md
  - Data Architecture: data-architecture.md
  # TODO: Create these guides when MkDocs documentation becomes a priority
  # - Architecture: architecture.md        (populate from TDD.md)
  # - Getting Started: getting-started.md  (populate from CLAUDE.md Commands)
  # - API Reference: api-reference.md      (link to FastAPI auto-docs /docs)
  # - Signals Guide: signals-guide.md      (document RSI, MACD, SMA, Bollinger, composite)
  # - Development:
  #   - Setup: dev/setup.md               (populate from CLAUDE.md)
  #   - Testing: dev/testing.md            (populate from .claude/rules/testing.md)
  #   - Changelog: dev/changelog.md        (populate from PROGRESS.md)

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
